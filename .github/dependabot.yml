version: 2

# Dependabot is SECURITY-ONLY here. Routine version bumps are owned by the
# twice-weekly upgrade-guard sweep (.github/workflows/upgrade-guard.yml): it
# applies npm minor/patch as one auto-merged lot, isolates each major, and also
# tracks the toolchain, the GitHub Actions, and the pinned Supabase CLI — from a
# known-green nightly baseline. Running Dependabot version updates on top of that
# duplicated the work and produced lockfile-conflicting PRs that had to be
# consolidated by hand (#225/#226: four bot PRs went red after rebase onto a
# lockfile that `main` had already bumped, then needed a manual regroup).
#
# `open-pull-requests-limit: 0` disables Dependabot *version* updates for the
# ecosystem while leaving Dependabot *security* updates untouched (those have a
# separate internal limit and are what we actually want from Dependabot — a fast
# lane for vulnerability advisories that doesn't wait on a green nightly). See
# docs/dependency-maintenance.md.
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 0
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
