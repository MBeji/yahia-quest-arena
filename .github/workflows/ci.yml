name: CI

on:
  pull_request:
  workflow_dispatch:

# PR-only (a push to main lands via an already-CI'd PR, so re-running on the merge
# commit just burns free-tier Actions minutes). `pull_request` tests the merge
# result, so main is still covered. Use "Run workflow" to check main on demand.
# Cancel superseded runs on the same ref so rapid pushes don't stack runners.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests + coverage
        run: npm run test:coverage

      - name: Build + bundle budgets
        run: npm run build:check

      - name: Runtime dependency audit
        run: npm run audit:deps
