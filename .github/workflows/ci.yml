name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# Runs on PRs (tests the merge result) and on pushes to main (a green signal on
# the default branch). Cancel superseded runs on the same ref so rapid pushes
# don't stack runners; "Run workflow" is available for an on-demand run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only reads the repo (no write scopes). On a public repo a
# fork-PR token is read-only anyway, but make it explicit and default-proof.
permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests + coverage
        run: npm run test:coverage

      # Anti-leak gate (étude 24, lot 4). Since the corpus split, the pedagogical
      # corpus, the generation factory (content-*/prof-* skills) and the compiled
      # content SQL live in the PRIVATE repo MBeji/yahia-quest-content. This step
      # fails the build if any of them reappears here — the failure mode RISK-8
      # predicts: a future session re-committing corpus out of habit.
      #
      # The content gates that used to run here (content:check, content:qa:strict,
      # content:audit:strict) and the transcription registry gate (programme:check)
      # moved WITH their data: they now run in the private repo's Content CI, which
      # checks this repo out for the engine. The engine itself — scripts/content/,
      # src/shared/content/ — stays here and stays covered by the unit gate.
      - name: Anti-leak gate (no corpus in the public repo)
        run: npm run leak:check

      # Harness anti-drift gate (étude 25): CLAUDE.md stays a thin @AGENTS.md
      # pointer, AGENTS.md stays in budget, no hidden Unicode, no model id
      # hardcoded outside harness/models.json.
      - name: Harness check
        run: npm run harness:check

      # Keep the k6 load harness (perf/) from rotting: every scenario must parse,
      # and its constants must still mirror the product hot paths (LEADERBOARD_LIMIT,
      # submit rate-limit budget). No k6 binary / Supabase secrets needed.
      - name: Perf harness sync check
        run: npm run perf:check

      - name: Build + bundle budgets
        run: npm run build:check

      # Production-shell browser smoke (incident 2026-07-01): builds and loads
      # the REAL prod bundle in Chromium and fails on any page error / error
      # page. The only tier that exercises prod-gated client code
      # (`import.meta.env.PROD`) — tsc, the unit gate, SSR checks and the
      # dev-server e2e all miss that class of crash.
      - name: Install Chromium (shell smoke)
        run: npx playwright install --with-deps chromium

      - name: Production shell smoke (real browser)
        run: npm run smoke:shell

      - name: Runtime dependency audit
        run: npm run audit:deps

  # The `content` job lived here until étude 24 lot 3b. It ran content:check /
  # content:qa:strict / content:audit:strict against the corpus; the corpus now
  # lives in the private repo, so the job moved there (Content CI, double checkout:
  # private corpus + this repo for the engine). Removing it here is deliberate —
  # see the anti-leak gate in `verify` above and docs/content-generation-pipeline.md.
