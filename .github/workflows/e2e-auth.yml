name: E2E (authenticated)

# Real authenticated browser journeys against a dedicated TEST Supabase project.
# Runs in the nightly build (see nightly.yml) and on demand. It SKIPS GRACEFULLY
# (green) when the test secrets are not configured, so it never blocks
# contributors who don't have them.
#
# Required repository secrets:
#   TEST_SUPABASE_URL                – the TEST project URL (NOT production)
#   TEST_SUPABASE_ANON_KEY           – its anon / publishable key
#   TEST_SUPABASE_SERVICE_ROLE_KEY   – its service-role key (for seeding/reset)
#   E2E_USER_PASSWORD                – password for the seeded test accounts
#
# Prereq: run all DB migrations + content on the test project once.

on:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: e2e-auth-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-auth:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check test secrets are configured
        id: guard
        run: |
          if [ -z "${{ secrets.TEST_SUPABASE_URL }}" ] || [ -z "${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "Test Supabase secrets are not set — skipping authenticated E2E."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
          # Optional: if a DB connection string is provided, this workflow can
          # self-provision the TEST schema + content (otherwise it's a prereq).
          if [ -z "${{ secrets.TEST_SUPABASE_DB_URL }}" ]; then
            echo "has_db_url=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_db_url=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.guard.outputs.configured == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.guard.outputs.configured == 'true'
        run: npm ci --no-audit --no-fund

      # The secret is often pasted scheme-less, quoted, padded — or is the
      # POSTGRES connection string altogether (seen in the nightly: supabase-js
      # then resolves hostname "postgresql"). normalizeSupabaseUrl fixes all of
      # those (deriving https://<ref>.supabase.co from a DB URI's project ref);
      # every later step (seed, reset, the Playwright dev server) reads the
      # normalized env.TEST_SUPABASE_URL.
      - name: Normalize TEST project URL
        if: steps.guard.outputs.configured == 'true'
        env:
          RAW_TEST_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
        run: |
          url="$(node --input-type=module -e 'const m = await import("./scripts/e2e/_env.mjs"); process.stdout.write(m.normalizeSupabaseUrl(process.env.RAW_TEST_SUPABASE_URL) ?? "")')"
          if ! printf '%s' "$url" | grep -qE '^https://'; then
            echo "::error::TEST_SUPABASE_URL is not a usable Supabase API URL — set the secret to https://<ref>.supabase.co (Project Settings → API)."
            exit 1
          fi
          echo "TEST_SUPABASE_URL=$url" >> "$GITHUB_ENV"

      - name: Cache Playwright browsers
        if: steps.guard.outputs.configured == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser (chromium)
        if: steps.guard.outputs.configured == 'true'
        run: npx playwright install --with-deps chromium

      # Self-provision the TEST database (schema + generated content) when a DB
      # connection string is available. Idempotent — only pushes new migrations.
      - name: Set up Supabase CLI
        if: steps.guard.outputs.configured == 'true' && steps.guard.outputs.has_db_url == 'true'
        uses: supabase/setup-cli@v1
        with:
          # Pinned: an unpinned "latest" bump (17.6.1.132 → .134 image) silently
          # broke the local-stack grants on 2026-06-07. Bump deliberately.
          version: 2.106.0

      # Goes through the e2e script (not raw `supabase db push`) so the DB URL is
      # normalized first: a raw password with special characters used to fail with
      # "invalid userinfo". The script also re-checks the prod-ref safety net.
      - name: Apply migrations + content to TEST project
        if: steps.guard.outputs.configured == 'true' && steps.guard.outputs.has_db_url == 'true'
        env:
          TEST_SUPABASE_DB_URL: ${{ secrets.TEST_SUPABASE_DB_URL }}
        run: npm run e2e:db:push

      - name: Seed test users
        if: steps.guard.outputs.configured == 'true'
        env:
          SUPABASE_URL: ${{ env.TEST_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
        run: npm run e2e:seed

      # Deterministic starting point: wipe accumulated gameplay state (keeps
      # accounts + roles/subscriptions from the seed).
      - name: Reset gameplay state
        if: steps.guard.outputs.configured == 'true'
        env:
          SUPABASE_URL: ${{ env.TEST_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/e2e/reset-gameplay.mjs

      - name: Run authenticated E2E
        if: steps.guard.outputs.configured == 'true'
        env:
          CI: "true"
          VITE_SUPABASE_URL: ${{ env.TEST_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          SUPABASE_URL: ${{ env.TEST_SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
        run: npm run test:e2e:auth

      - name: Upload Playwright report
        if: ${{ steps.guard.outputs.configured == 'true' && !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-auth
          path: playwright-report/
          retention-days: 7
