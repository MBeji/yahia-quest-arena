name: db-migrate-prod

# THE sanctioned way to apply Supabase migrations to PRODUCTION (CLAUDE.md §7).
# Nobody runs prod migrations by hand anymore: author the migration, merge it,
# this workflow applies it. Credentials never leave GitHub secrets.
#
#   push (main, supabase/migrations/**) -> auto-apply pending migrations to prod
#   workflow_dispatch                   -> manual: push | list (read-only) | repair-all
#
# Safety: a fresh pg_dump of prod is taken & uploaded BEFORE any apply; the
# scripts/db/push-prod.mjs guard refuses to run unless the URL targets prod (and
# never test); the pending list is printed before AND after. Reuses the existing
# PROD_SUPABASE_DB_URL secret (same one db-backup.yml uses).

on:
  push:
    branches: [main]
    paths: ["supabase/migrations/**"]
  workflow_dispatch:
    inputs:
      mode:
        description: "push = apply pending · list = read-only diff · repair-all = bootstrap (mark all local applied) · repair-revert = clear remote-only phantom(s) then push"
        type: choice
        options: [push, list, repair-all, repair-revert]
        default: push
      versions:
        description: "repair-revert only: space-separated 14-digit version(s) to mark reverted (remote-only phantoms with no local file)"
        type: string
        default: ""

# Never let two prod migration runs overlap.
concurrency:
  group: db-migrate-prod
  cancel-in-progress: false

permissions:
  contents: read
  # Open/update a tracking issue when an auto-apply fails. A back-dated migration
  # (#97) made `db push` abort on EVERY push to `main` for ~2 weeks while the
  # failure stayed buried in the Actions log — prod silently fell behind code.
  # This surfaces it the same day (#227/#229).
  issues: write

jobs:
  migrate:
    name: Apply migrations to prod
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MODE: ${{ github.event.inputs.mode || 'push' }}
      PROD_SUPABASE_DB_URL: ${{ secrets.PROD_SUPABASE_DB_URL }}
    steps:
      - name: Guard — prod secret present
        run: |
          if [ -z "${PROD_SUPABASE_DB_URL}" ]; then
            echo "::error::Secret PROD_SUPABASE_DB_URL manquant (Settings > Secrets and variables > Actions)."
            exit 1
          fi
          echo "Mode: ${MODE}"

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install the Supabase CLI
        # Pinned to the same version as db-tests.yml / e2e-auth.yml for a
        # deterministic toolchain. Bump deliberately, with a green run.
        uses: supabase/setup-cli@v2
        with:
          version: 2.108.0

      # --- Pre-apply safety net: a fresh prod dump (skipped for read-only list) ---
      - name: Install postgresql-client-17 (prod runs Postgres 17.x)
        if: ${{ env.MODE != 'list' }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-common >/dev/null
          yes | sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh >/dev/null
          sudo apt-get install -y -qq postgresql-client-17 >/dev/null
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"

      - name: Backup prod (pg_dump public+auth) BEFORE applying
        if: ${{ env.MODE != 'list' }}
        run: |
          set -euo pipefail
          STAMP="$(date -u +%Y%m%d-%H%M%S)"
          FILE="prod-pre-migration-${STAMP}.dump"
          pg_dump "${PROD_SUPABASE_DB_URL}" -Fc --schema=public --schema=auth -f "$FILE"
          OBJECTS=$(pg_restore --list "$FILE" | wc -l)
          echo "STAMP=$STAMP" >> "$GITHUB_ENV"
          echo "FILE=$FILE" >> "$GITHUB_ENV"
          echo "### Pre-migration backup \`$FILE\` — $OBJECTS objects" >> "$GITHUB_STEP_SUMMARY"
          # Abort the whole run if the dump looks empty/broken — never apply on top
          # of a backup we couldn't trust.
          [ "$OBJECTS" -gt 50 ] || { echo "::error::Dump suspect ($OBJECTS objets) — abort avant migration."; exit 1; }

      - name: Upload pre-migration backup (retention 14 j)
        if: ${{ env.MODE != 'list' }}
        uses: actions/upload-artifact@v7
        with:
          name: prod-pre-migration-${{ env.STAMP }}
          path: ${{ env.FILE }}
          retention-days: 14
          if-no-files-found: error

      # --- Pending diff (read-only) — always shown first ---
      - name: Pending migrations (before)
        run: node scripts/db/push-prod.mjs --mode list

      # --- Apply / bootstrap ---
      - name: Apply pending migrations (db push)
        if: ${{ env.MODE == 'push' }}
        run: node scripts/db/push-prod.mjs --mode push

      - name: Bootstrap — mark all local migrations as applied (repair-all)
        if: ${{ env.MODE == 'repair-all' }}
        run: node scripts/db/push-prod.mjs --mode repair-all

      # Clear a remote-only PHANTOM (a version applied to prod whose migration file
      # was later removed/renamed on main) then apply the genuinely-pending
      # migrations. Bookkeeping-only revert: no down-SQL, no data touched.
      - name: Repair phantom history then apply (repair-revert)
        if: ${{ env.MODE == 'repair-revert' }}
        env:
          REPAIR_VERSIONS: ${{ github.event.inputs.versions }}
        run: node scripts/db/push-prod.mjs --mode repair-revert

      # --- Confirm the post-apply state ---
      - name: Pending migrations (after)
        if: ${{ env.MODE != 'list' }}
        run: node scripts/db/push-prod.mjs --mode list

      # --- Surface a failed auto-apply (never let it stay buried in the log) ---
      # Only for the automatic push trigger: a manual dispatch has a human watching.
      - name: Report apply outcome on a tracking issue
        if: ${{ always() && github.event_name == 'push' }}
        uses: actions/github-script@v9
        env:
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const failed = process.env.JOB_STATUS !== 'success';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const date = new Date().toISOString().slice(0, 10);
            const LABEL = 'prod-migration-failure';

            try {
              await github.rest.issues.getLabel({ ...context.repo, name: LABEL });
            } catch {
              await github.rest.issues.createLabel({
                ...context.repo,
                name: LABEL,
                color: 'b60205',
                description: "Échec de l'auto-apply des migrations en production",
              });
            }

            const existing = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: LABEL,
            });

            if (failed) {
              let body = `### 🛑 Auto-apply des migrations en PRODUCTION en échec — ${date}\n\n`;
              body += `\`db-migrate-prod\` a échoué sur le push \`${context.sha.slice(0, 7)}\`. `;
              body += `Tant que ce job échoue, **la prod est en retard sur le code** `;
              body += `(une migration mal horodatée bloque \`supabase db push\`, et toutes `;
              body += `les migrations suivantes restent en attente derrière elle).\n\n`;
              body += `**À faire** : ouvrir le run, lire l'erreur \`db push\`, corriger l'ordre `;
              body += `(re-horodater la migration fautive pour qu'elle trie APRÈS la dernière `;
              body += `appliquée), puis re-déclencher le workflow. Voir CLAUDE.md §7.\n\n`;
              body += `[Voir le run complet](${runUrl})\n`;

              const title = '🛑 Auto-apply migrations prod en échec';
              if (existing.data.length > 0) {
                const n = existing.data[0].number;
                await github.rest.issues.update({ ...context.repo, issue_number: n, title });
                await github.rest.issues.createComment({ ...context.repo, issue_number: n, body });
              } else {
                await github.rest.issues.create({ ...context.repo, title, body, labels: [LABEL] });
              }
              core.setFailed('Prod migration auto-apply failed — see the tracking issue.');
            } else {
              // Apply succeeded: close any open failure issue with a recovery note.
              for (const issue of existing.data) {
                await github.rest.issues.createComment({
                  ...context.repo,
                  issue_number: issue.number,
                  body: `✅ Auto-apply repassé au vert le ${date} ([run](${runUrl})) — fermeture automatique.`,
                });
                await github.rest.issues.update({
                  ...context.repo,
                  issue_number: issue.number,
                  state: 'closed',
                });
              }
            }
