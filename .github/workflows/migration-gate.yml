name: Migration gate

# Informational guardrail (CLAUDE.md §7). Merging a new `supabase/migrations/*.sql`
# to `main` now AUTO-APPLIES it to the production DB via db-migrate-prod.yml — no
# human action, no manual SQL. This check just SURFACES, on the PR, which
# migration(s) will be auto-applied on merge, so the diff is never a surprise.
#
# It always passes: the apply itself is gated by the `pgTAP suite` check (proves
# the migrations apply cleanly on a fresh DB) and by db-migrate-prod.yml's own
# prod-ref guard + pre-apply backup. The job/check name `Migration presence` is
# kept verbatim so the branch-protection ruleset's required-check contract is
# unchanged.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  migration-presence:
    name: Migration presence
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v5
        with:
          # Full history so we can diff against the base branch tip.
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch --no-tags origin "${{ github.base_ref }}"

      - name: Surface migrations that will auto-apply on merge
        run: |
          set -euo pipefail
          base="origin/${{ github.base_ref }}"
          # Added/modified migration SQL between the base tip and this PR head.
          migrations="$(git diff --name-only "${base}...HEAD" -- supabase/migrations \
            | grep '\.sql$' || true)"

          if [ -z "${migrations}" ]; then
            echo "No new Supabase migrations in this PR."
            exit 0
          fi

          count="$(echo "${migrations}" | wc -l | tr -d ' ')"
          {
            echo "### Migrations to auto-apply on merge"
            echo ""
            echo "On merge to \`main\`, \`db-migrate-prod.yml\` applies these to PRODUCTION"
            echo "(pre-apply \`pg_dump\` backup + prod-ref guard). No manual SQL — see CLAUDE.md §7:"
            echo ""
            echo "${migrations}" | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=Migration gate::${count} migration(s) will auto-apply to prod on merge (db-migrate-prod.yml)."
