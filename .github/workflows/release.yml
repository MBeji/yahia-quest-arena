name: Release tag

# Implements docs/release-tagging-policy.md: a traceable SemVer tag per release,
# cut from `main` ONLY after CI is green. Triggered when `package.json` version
# changes on a push to main, or on demand. Idempotent: skips if the tag exists.
on:
  push:
    branches: [main]
    paths: ["package.json"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Needs write to create/push the annotated tag and publish the GitHub release.
permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: check
        run: |
          tag="v${{ steps.ver.outputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $tag already exists — nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push annotated tag
        if: steps.check.outputs.exists == 'false'
        env:
          TAG: v${{ steps.ver.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Publish GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ steps.ver.outputs.version }}
        run: gh release create "$TAG" --title "$TAG" --generate-notes
