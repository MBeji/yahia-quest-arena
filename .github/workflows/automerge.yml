name: Auto-merge

# Arms GitHub's native auto-merge on every eligible PR so the merge happens
# automatically the moment the ruleset's required checks (`verify`, `Migration
# presence`, `Migration order`, `CodeQL`) are green — completing the fully
# automatic push → PR → checks → merge → deploy chain (Vercel + db-migrate-prod
# fire on the merge to main).
#
# Security model — arming is cheap, MERGING is gated:
#   • Only same-repo branches: a fork PR's GITHUB_TOKEN is read-only anyway,
#     and we never want external code merging itself.
#   • Drafts are skipped (auto-pr.yml opens drafts by default): marking a PR
#     "ready for review" is the one deliberate human step.
#   • The `no-automerge` label opts a PR out (and disarms it if already armed).
#   • The actual merge is enforced by the main-protection ruleset: all required
#     status checks green on an up-to-date head (strict policy). This workflow
#     cannot bypass any of that — it only flips the auto-merge bit.
#
# Prerequisite: "Allow auto-merge" must be enabled in Settings > General.
#
# NOTE on GH_AUTOMATION_PAT: this job's own `pull_request` trigger is itself
# gated behind manual "Approve and run" when the PR was opened by the
# `github-actions[bot]` actor (not a repo collaborator — same mechanism GitHub
# uses for fork PRs from outside contributors, applied here to our own
# bot-opened PRs). Confirmed live: this exact job sat at `action_required`
# alongside CI/CodeQL/Migration gate on bot-opened PRs. auto-pr.yml's
# `GH_AUTOMATION_PAT` secret (see its header) fixes this at the source — a
# PAT-opened PR's events are attributed to a real collaborator and are never
# gated, including THIS job. Without that secret, auto-pr.yml's own
# [auto-merge] fast path is the only reliable way to arm a bot-opened PR
# (this job may simply never run, or sit pending approval).
#
# The `keep-up-to-date` job closes a separate gap: the ruleset's STRICT policy
# only merges an up-to-date head, but GitHub never updates a PR branch by
# itself — an armed PR that falls behind main would wait forever. On every
# push to main, armed-but-behind PRs get their branch updated, and the
# required workflows are re-dispatched on them as a GITHUB_TOKEN-fallback
# safety net (redundant, and harmless, when GH_AUTOMATION_PAT is configured —
# the update-branch commit then fires its own non-gated pull_request run).

on:
  pull_request:
    types: [opened, reopened, ready_for_review, labeled, unlabeled]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  # keep-up-to-date re-dispatches the required-check workflows.
  actions: write

concurrency:
  # Per-PR group on pull_request events; a single group for main pushes.
  group: automerge-${{ github.event.pull_request.number || 'main-push' }}
  cancel-in-progress: true

jobs:
  arm:
    name: Arm or disarm auto-merge
    # Same-repo PRs only (see security model above).
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GH_AUTOMATION_PAT || secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      PR: ${{ github.event.pull_request.number }}
      BRANCH: ${{ github.event.pull_request.head.ref }}
      IS_DRAFT: ${{ github.event.pull_request.draft }}
      OPTED_OUT: ${{ contains(github.event.pull_request.labels.*.name, 'no-automerge') }}
      USING_PAT: ${{ secrets.GH_AUTOMATION_PAT != '' }}
    steps:
      - name: Arm (or disarm) native auto-merge
        run: |
          set -euo pipefail

          if [ "$OPTED_OUT" = "true" ]; then
            # Disarm idempotently: fails harmlessly when nothing was armed.
            gh pr merge "$PR" --repo "$REPO" --disable-auto \
              && echo "Auto-merge disarmed (label no-automerge)." \
              || echo "Nothing to disarm."
            exit 0
          fi

          if [ "$IS_DRAFT" = "true" ]; then
            echo "Draft PR — auto-merge arms when it's marked ready for review."
            exit 0
          fi

          # Squash + delete-branch: same merge shape as the upgrade guard's lot.
          if gh pr merge "$PR" --repo "$REPO" --auto --squash --delete-branch; then
            echo "Auto-merge armed on #$PR — merges when all required checks are green."
          else
            echo "::warning title=Auto-merge non armé::PR #$PR : activez 'Allow auto-merge' (Settings > General), ou la PR est déjà mergeable/fermée."
            exit 0
          fi

          # Race guard: if the PR is ALREADY behind main at arming time (main
          # moved while it was a draft / before it was armed), no future main
          # push is guaranteed to rescue it — keep-up-to-date only sees armed
          # PRs. Update it now.
          state="$(gh pr view "$PR" --repo "$REPO" --json mergeStateStatus --jq .mergeStateStatus)"
          if [ "$state" = "BEHIND" ]; then
            echo "PR #$PR is behind main — updating branch now."
            if ! gh api -X PUT "repos/$REPO/pulls/$PR/update-branch" >/dev/null; then
              echo "::warning title=Update impossible::PR #$PR : update-branch refusé (conflit ?). Résolution manuelle requise."
              exit 0
            fi
            if [ "$USING_PAT" != "true" ]; then
              # GITHUB_TOKEN fallback only: the update commit's pull_request
              # run would be gated (see header), so re-dispatch as a workaround.
              # Redundant with a PAT — that commit already fires its own
              # non-gated run.
              gh workflow run ci.yml --repo "$REPO" --ref "$BRANCH"
              gh workflow run migration-gate.yml --repo "$REPO" --ref "$BRANCH" -f base=main
              gh workflow run codeql.yml --repo "$REPO" --ref "$BRANCH"
              echo "PR #$PR updated + required checks re-dispatched (no GH_AUTOMATION_PAT configured)."
            else
              echo "PR #$PR updated — its own pull_request run will report the required checks."
            fi
          fi

  keep-up-to-date:
    name: Update armed PRs left behind by this push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ secrets.GH_AUTOMATION_PAT || secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      USING_PAT: ${{ secrets.GH_AUTOMATION_PAT != '' }}
    steps:
      - name: Update branch + re-dispatch required checks
        run: |
          set -euo pipefail
          # Armed, same-repo, non-draft PRs whose head is now behind main.
          # mergeStateStatus BEHIND == the ruleset's "up to date" gate is what
          # blocks them; everything else (BLOCKED = checks pending, DIRTY =
          # conflict) is not ours to fix here.
          prs="$(gh pr list --repo "$REPO" --base main --state open \
            --json number,isDraft,headRefName,mergeStateStatus,autoMergeRequest,headRepositoryOwner \
            --jq '.[] | select(.autoMergeRequest != null
                               and .isDraft == false
                               and .mergeStateStatus == "BEHIND"
                               and .headRepositoryOwner.login == "'"${REPO%%/*}"'")
                      | "\(.number) \(.headRefName)"')"

          if [ -z "$prs" ]; then
            echo "No armed PR is behind main — nothing to update."
            exit 0
          fi

          while read -r pr branch; do
            echo "PR #$pr ($branch) is behind main — updating branch."
            if ! gh api -X PUT "repos/$REPO/pulls/$pr/update-branch" >/dev/null; then
              echo "::warning title=Update impossible::PR #$pr : update-branch refusé (conflit ?). Résolution manuelle requise."
              continue
            fi
            if [ "$USING_PAT" != "true" ]; then
              # GITHUB_TOKEN fallback only: re-dispatch as a workaround for the
              # gated native run (see workflow header). Redundant with a PAT.
              gh workflow run ci.yml --repo "$REPO" --ref "$branch"
              gh workflow run migration-gate.yml --repo "$REPO" --ref "$branch" -f base=main
              gh workflow run codeql.yml --repo "$REPO" --ref "$branch"
              echo "PR #$pr updated + required checks re-dispatched (no GH_AUTOMATION_PAT configured)."
            else
              echo "PR #$pr updated — its own pull_request run will report the required checks."
            fi
          done <<< "$prs"
