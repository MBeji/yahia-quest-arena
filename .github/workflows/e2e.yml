name: E2E

# Slow Playwright suite (~20 min). No longer per-commit: it runs in the nightly
# build (see nightly.yml) and can be triggered on demand from the Actions tab.
on:
  workflow_call:
    inputs:
      ref:
        description: Git ref (branch/SHA) to test. Empty = the triggering ref (default).
        type: string
        required: false
        default: ""
  workflow_dispatch:

# Newer pushes cancel in-flight runs for the same ref.
concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Dummy Supabase vars so the dev server boots. The public landing page
      # under test never calls Supabase, so no real secrets are required.
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: e2e-dummy-key
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_PUBLISHABLE_KEY: e2e-dummy-key

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Empty (the default) checks out the triggering ref, so existing callers
          # (nightly.yml) are unaffected; the upgrade guard passes its branch here.
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # Guardrails so the e2e suite can't silently rot (it's not in `npm run verify`).
      - name: Typecheck e2e
        run: npx tsc --noEmit -p e2e/tsconfig.json

      - name: Lint e2e
        run: npx eslint e2e --max-warnings=0

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (public)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
