name: DB integration tests

# Runs the pgTAP suite (supabase/tests/*.sql) against a REAL Postgres with ALL
# migrations applied, via the Supabase CLI local stack. This is the executable
# safety net for the SECURITY DEFINER SQL (grants, RLS, scoring/anti-cheat) that
# the Vitest unit suite cannot cover because it mocks Supabase.
#
# Harness choice: we use the Supabase CLI (`supabase db start` + `supabase test
# db`) rather than a bare `postgres:` service container. The CLI applies every
# migration in `supabase/migrations/` in order against the real Supabase image,
# so `auth.uid()`, `auth.jwt()` and the `anon` / `authenticated` / `service_role`
# roles match production exactly — which is precisely what these tests assert
# against. A bare postgres service would need hand-rolled shims for all of that.

# Slow pgTAP suite (Docker + ~120 migrations, ~5-8 min). Not per-commit: it runs
# in the nightly build (see nightly.yml), on demand from the Actions tab, and —
# since 2026-07-20 — on any PR touching `supabase/migrations/**` or
# `supabase/tests/**`.
#
# Why the PR trigger exists. Removing the generated content migrations (étude 24,
# #544) broke the rebuild of a FRESH database in several ways: migrations that
# STAYED silently depended on rows the removed ones created (subjects, chapters,
# exercises), on the widening of `exercises_mode_check` their guard carried, and
# on the prune that kept old seed rows from colliding with the pgTAP fixtures. It
# took five follow-up PRs (#548, #549, #552, #557, #570) to sort out.
#
# `db:check-chain` (in `verify`) now catches the STRUCTURAL half statically — FK
# orphans, version collisions — fast and locally. This workflow is the EXECUTABLE
# other half: it runs the real suite on a real Postgres, so it also catches what
# static analysis can't (constraint semantics, fixture collisions, RLS/grants,
# SECURITY DEFINER behaviour). None of the above was caught at PR time because
# this suite only ran nightly and on demand — every breakage surfaced AFTER its
# merge, by hand. A PR touching migrations or the suite is worth 5-8 minutes.
#
# NOTE: REPORTING check, not required. The `main-protection` ruleset lists
# `verify`, `Migration presence`, `Migration order` and `CodeQL`; auto-merge
# waits only on those, so a red run here surfaces a problem without blocking the
# merge. Promoting it to required is a deliberate call — it adds 5-8 min to every
# migration PR. This file is CODEOWNER-gated (workflows), so the trigger lands
# only with an owner's review.
on:
  pull_request:
    paths: ["supabase/migrations/**", "supabase/tests/**"]
  workflow_call:
    inputs:
      ref:
        description: Git ref (branch/SHA) to test. Empty = the triggering ref (default).
        type: string
        required: false
        default: ""
  workflow_dispatch:

# Read-only: the job only needs the checkout.
permissions:
  contents: read

# A second push to the same ref cancels the in-flight run (Docker boots are slow).
concurrency:
  group: db-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pgtap:
    name: pgTAP suite
    runs-on: ubuntu-latest
    # Booting the Supabase stack (pulling images) + applying ~60 migrations is
    # the slow part; 20 min is comfortable headroom over the typical ~5-8 min.
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Empty (the default) checks out the triggering ref, so existing callers
          # (nightly.yml) are unaffected; the upgrade guard passes its branch here.
          ref: ${{ inputs.ref }}

      - name: Install the Supabase CLI
        uses: supabase/setup-cli@3c2f5e2ae34c34e428e8e206e2c4d21fa2d20fbf # v2
        with:
          # Pinned: an unpinned "latest" bump (supabase/postgres 17.6.1.132 → .134,
          # 2026-06-07) silently dropped the default table privileges on the local
          # stack and broke this suite for 5 nights. The schema now carries explicit
          # grants (20260612221000_baseline_table_grants), but keep the toolchain
          # deterministic anyway. Bump deliberately, with a green run.
          version: 2.108.0

      - name: Start the local stack (applies all migrations)
        # `supabase db start` boots just Postgres + applies every migration in
        # supabase/migrations/ in order. We avoid the full `supabase start`
        # (Studio/Kong/etc.) since the tests only need the database.
        run: supabase db start

      - name: Run pgTAP integration tests
        # `supabase test db` discovers supabase/tests/*.sql, runs them through
        # pg_prove, and exits non-zero on ANY failing assertion -> fails the job.
        run: supabase test db

      - name: Tear down
        if: always()
        run: supabase stop --no-backup
